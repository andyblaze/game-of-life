<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Forward Flight Universe</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}
canvas {
  display: block;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize() {
  c.width = innerWidth;
  c.height = innerHeight;
}
addEventListener("resize", resize);
resize();

// ----------------------------
// SHIP (forward motion)
// ----------------------------
const ship = {
  z: 0,
  speed: 2.2 // forward speed
};

// ----------------------------
// WORLD SETTINGS
// ----------------------------
const STAR_COUNT = 120;
const DEPTH_SPREAD = 4000;

// ----------------------------
// STAR SYSTEMS
// ----------------------------
const stars = [];

function makeStar(z) {
  const hasPlanets = Math.random() < 0.6;

  const planets = [];
  if (hasPlanets) {
    const n = 1 + Math.floor(Math.random() * 5);
    for (let i = 0; i < n; i++) {
      planets.push({
        dist: 30 + Math.random() * 120,
        angle: Math.random() * Math.PI * 2,
        speed: 0.005 + Math.random() * 0.01,
        size: 2 + Math.random() * 3
      });
    }
  }

  return {
    x: (Math.random() - 0.5) * 1200,
    y: (Math.random() - 0.5) * 800,
    z: z,
    r: 2 + Math.random() * 3,
    hasPlanets,
    planets
  };
}

// initial field ahead of ship
for (let i = 0; i < STAR_COUNT; i++) {
  stars.push(makeStar(Math.random() * DEPTH_SPREAD));
}

// ----------------------------
// RECYCLING (behind ship → ahead)
// ----------------------------
function recycle(s) {
  s.x = (Math.random() - 0.5) * 1200;
  s.y = (Math.random() - 0.5) * 800;
  s.z = ship.z + DEPTH_SPREAD;

  s.hasPlanets = Math.random() < 0.6;

  s.planets = [];
  if (s.hasPlanets) {
    const n = 1 + Math.floor(Math.random() * 5);
    for (let i = 0; i < n; i++) {
      s.planets.push({
        dist: 30 + Math.random() * 120,
        angle: Math.random() * Math.PI * 2,
        speed: 0.005 + Math.random() * 0.01,
        size: 2 + Math.random() * 3
      });
    }
  }
}

// ----------------------------
// UPDATE
// ----------------------------
function update() {

  // ship moves forward
  ship.z += ship.speed;

  for (let s of stars) {

    // planets always orbit
    for (let p of s.planets) {
      p.angle += p.speed;
    }

    // recycle when passed behind ship
    if (s.z < ship.z - 200) {
      recycle(s);
    }
  }

  draw();
  requestAnimationFrame(update);
}

// ----------------------------
// SIMPLE PERSPECTIVE PROJECTION
// ----------------------------
function project(s) {
  const dz = s.z - ship.z;
  const scale = 600 / dz;

  return {
    x: c.width / 2 + s.x * scale,
    y: c.height / 2 + s.y * scale,
    scale,
    dz
  };
}

// ----------------------------
// DRAW
// ----------------------------
function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, c.width, c.height);

  for (let s of stars) {

    const p = project(s);

    // behind or too close → skip rendering
    if (p.dz <= 0) continue;

    // star
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(p.x, p.y, s.r * p.scale, 0, Math.PI * 2);
    ctx.fill();

    // planets (only visible when close enough naturally via scale)
    if (s.hasPlanets) {
      for (let pl of s.planets) {

        const px = p.x + Math.cos(pl.angle) * pl.dist * p.scale;
        const py = p.y + Math.sin(pl.angle) * pl.dist * p.scale;

        ctx.fillStyle = "rgba(200,200,255,1)";
        ctx.beginPath();
        ctx.arc(px, py, pl.size * p.scale, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // ship marker
  ctx.fillStyle = "red";
  ctx.fillRect(c.width/2 - 2, c.height/2 - 2, 4, 4);
}

update();
</script>
</body>
</html>
