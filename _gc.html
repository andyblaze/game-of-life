<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Forward Flight Universe</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}
canvas {
  display: block;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize() {
  c.width = innerWidth;
  c.height = innerHeight;
}
addEventListener("resize", resize);
resize();

// ----------------------------
// SHIP (forward motion)
// ----------------------------
class Ship {
    constructor() {
        this.z = 0;
        this.speed = 2.2; // forward speed
        this.x = c.width/2 - 2;
        this.y = c.height/2 - 2;
    }
    render(ctx) {
        ctx.fillStyle = "red";
        ctx.fillRect(this.x, this.y, 4, 4);
    }
}
const ship = new Ship();

// ----------------------------
// WORLD SETTINGS
// ----------------------------
const STAR_COUNT = 120;
const DEPTH_SPREAD = 4000;

// ----------------------------
// STAR SYSTEMS
// ----------------------------
const stars = [];

const colors = ["cyan", "green", "yellow", "purple", "blue", "brown", "gray", "magenta"];

class Planet {
    constructor() {
        this.dist = 30 + Math.random() * 120;
        this.angle = Math.random() * Math.PI * 2;
        this.speed = 0.005 + Math.random() * 0.01;
        this.size = 2 + Math.random() * 3; 
        this.color = colors[Math.floor(Math.random() * colors.length)];
    }
    render(ctx, p) {
        const px = p.x + Math.cos(this.angle) * this.dist * p.scale;
        const py = p.y + Math.sin(this.angle) * this.dist * p.scale;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(px, py, this.size * p.scale, 0, Math.PI * 2);
        ctx.fill();    
    }
}

class Star {
    constructor(zindex) {
        this.planets = [];
        this.hasPlanets = true;
        this.setPlanets();
        this.setPosition(zindex);
        this.r = 2 + Math.random() * 3;
    }
    setPosition(zindex) {
        this.x = (Math.random() - 0.5) * 1200;
        this.y = (Math.random() - 0.5) * 800;
        this.z = zindex;    
    }
    setPlanets() {
        this.planets = [];
        this.hasPlanets = Math.random() < 0.6;        
        if ( this.hasPlanets ) {
            const n = 1 + Math.floor(Math.random() * 5);
            for ( let i = 0; i < n; i++ ) {
                this.planets.push(new Planet());
            }
        }
    }
    render(ctx, p) {
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(p.x, p.y, this.r * p.scale, 0, Math.PI * 2);
        ctx.fill();  
        if ( this.hasPlanets ) {
            for (let pl of this.planets) {
                pl.render(ctx, p);
            }
        }
    }
    update() {  // planets always orbit
        for (let p of this.planets) {
            p.angle += p.speed;
        }    
    }
    // ----------------------------
    // RECYCLING (behind ship → ahead)
    // ----------------------------
    recycle(zindex) {
        this.setPlanets();
        this.setPosition(zindex);
    }
}

// initial field ahead of ship
for (let i = 0; i < STAR_COUNT; i++) {
  stars.push(new Star(Math.random() * DEPTH_SPREAD)); //makeStar(Math.random() * DEPTH_SPREAD));
}

// ----------------------------
// SIMPLE PERSPECTIVE PROJECTION
// ----------------------------
function project(s) {
  const dz = s.z - ship.z;
  const scale = 600 / dz;

  return {
    x: c.width / 2 + s.x * scale,
    y: c.height / 2 + s.y * scale,
    scale,
    dz
  };
}

// ----------------------------
// DRAW
// ----------------------------
function draw(ctx, stars) {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, c.width, c.height);

  /*for (let star of stars) {
    const p = project(star);
    // behind or too close → skip rendering
    if (p.dz <= 0) continue;
    // star
    star.render(ctx, p);
  }*/
  // ship marker
  ctx.fillStyle = "red";
  ctx.fillRect(c.width/2 - 2, c.height/2 - 2, 4, 4);
}

function recycle(star) {
    star.setPlanets();
    star.setPosition(ship.z + DEPTH_SPREAD);
}

// ----------------------------
// UPDATE
// ----------------------------
function update(timestamp) {
    // ship moves forward
    ship.z += ship.speed;
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, c.width, c.height);
    for ( let star of stars ) {
        star.update();
        // recycle when passed behind ship
        if (star.z < ship.z - 200) {
            star.recycle(ship.z + DEPTH_SPREAD);
        }
        
        const p = project(star);
        // behind or too close → skip rendering
        if (p.dz <= 0) continue;
        // star
        star.render(ctx, p);
    }
    ship.render(ctx);
    requestAnimationFrame(update);
}
update(performance.now());
</script>
</body>
</html>
