<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Forward Flight Universe</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}
canvas {
  display: block;
}
</style>
</head>
<body>
<canvas id="html-canvas"></canvas>

<script>
class DeltaReport {
    static lastTime = performance.now();
    static startTime = performance.now();
    static frameCount = 0;
    static sum = 0;
    static min = Infinity;
    static max = 0;
    static timeSum = 0; // total ms of frame times (not normalised)
    static fps = 0;
    static fpsEl = null;

    static spew() {
        console.log(Math.random());
    }

    static reset() {
        this.frameCount = 0;
        this.sum = 0;
        this.timeSum = 0;
    }

    static calc(timestamp) {        
        const deltaTime = timestamp - this.lastTime; // ms since last frame
        const delta = deltaTime / 16.67; // normalised to 60fps

        this.sum += delta;
        this.timeSum += deltaTime;
        this.lastTime = timestamp;

        this.fps = parseInt(60 / (this.sum / this.frameCount));
        if ( this.fps < this.min ) this.min = this.fps; 
        if ( this.fps > this.max ) this.max = this.fps; 

        const avgFrameTime = this.timeSum / this.frameCount; // ms
        const totalSeconds = Math.floor((timestamp - this.startTime) / 1000);
        const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, "0");
        const seconds = (totalSeconds % 60).toString().padStart(2, "0");
        const elapsed = minutes + ":" + seconds;
        return [ avgFrameTime, elapsed ];
    }

    static display(timestamp, htmlId) {
        if ( this.fpsEl === null ) this.fpsEl = htmlId;
        this.frameCount++;
        if (this.frameCount === 120) {
            DeltaReport.calc(timestamp);  
            this.fpsEl.innerText = this.fps;

            // Clear any previous fps-* class
            this.fpsEl.classList.remove("fps-best", "fps-ok", "fps-bad");

            // Add class based on fps
            if (this.fps >= 55) {
                this.fpsEl.classList.add("fps-best");
            } else if (this.fps >= 40) {
                this.fpsEl.classList.add("fps-ok");
            } else {
                this.fpsEl.classList.add("fps-bad");
            }
            DeltaReport.reset();
        }
    }

    static log(timestamp) { 
        this.frameCount++;
        if (this.frameCount === 120) { // ~2 seconds at 60fps
            const [avgFrameTime, elapsed] = DeltaReport.calc(timestamp);        

            console.log(
                "fps", this.fps,
                "min=", this.min,
                "max=", this.max,
                "avgFrame=", avgFrameTime.toFixed(2) + "ms",
                "elapsed=", elapsed
            );
            DeltaReport.reset();
        }
    }
}
class Config {
    constructor(canvasId) {
        this.STAR_COUNT = 120;
        this.DEPTH_SPREAD = 4000;
        this.planetTypes = ["rocky", "desert", "ice", "gas"];
        this.palettes = {
            rocky: ["#2e4b2f", "#3a6b4a", "#1f3d5c", "#6b4f3a", "#7a7a7a"],
            desert: ["#b55239", "#c46a2f", "#8c3b2a", "#d18b55"],
            ice: ["#cfe9ff", "#9fd3ff", "#bfc7d5", "#e6f2ff"],
            gas: ["#d6c6a1", "#c2a57b", "#a8835a", "#e6d6b8"]
        };
        this.starColors = ["#ffffff", "#aaccff", "#ffd28a", "#ff9a6b"];
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext("2d");
        this.resize();
    }
    resize() {
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        this.halfWidth = this.width / 2;
        this.halfHeight = this.height / 2;
    }
}

const config = new Config("html-canvas");

addEventListener("resize", () => config.resize());

function randomOutside(min, max) {
    const sign = Math.random() < 0.5 ? -1 : 1;
    return sign * (min + Math.random() * (max - min));
}

// ----------------------------
// SHIP (forward motion)
// ----------------------------
class Ship {
    constructor(cfg) {
        this.cfg = cfg;
        this.z = 0;
        this.speed = 2; // forward speed
        this.targetSpeed = 2;
        this.isChangingSpeed = false;
        this.x = 0;
        this.y = 0;
        this.targetX = this.x;
        this.targetY = this.y;
        this.isSteering = false;
    }
    update() {
        this.z += this.speed;
        if (Math.random() < 0.1 && this.isChangingSpeed === false) {
            const newSpeed = Math.random() * 2; // 0 → 3 allows stop and faster movement
            this.setSpeed(newSpeed);
        }
        if (this.isChangingSpeed === true) {
            const easing = 0.02;

            const ds = this.targetSpeed - this.speed;
            this.speed += ds * easing;

            if (Math.abs(ds) < 0.01) {
                this.isChangingSpeed = false;
            }
        }
        if ( Math.random() < 0.016 && this.isSteering === false ) {
            const sx = randomOutside(200, 400);
            const sy = randomOutside(50, 150);
            this.steer(sx, sy);
        }
        if ( this.isSteering === true ) {
            const easing = 0.05;
            this.x += (this.targetX - this.x) * easing;
            this.y += (this.targetY - this.y) * easing;
            const dx = this.targetX - this.x;
            const dy = this.targetY - this.y;

            if (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5) {
                this.isSteering = false;
            }
        }
    }
    setSpeed(s) {
        this.targetSpeed = s;
        this.isChangingSpeed = true;
    }
    steer(h, v) {
        if ( this.isSteering === true ) return;
        this.targetX = this.x + h;
        this.targetY = this.y + v;
        this.isSteering = true;
    }
    render(ctx) {
        ctx.fillStyle = "red";
        ctx.fillRect(this.cfg.halfWidth - 2, this.cfg.halfHeight - 2, 4, 4);
    }
}

class Planet {
    constructor(cfg) {
        this.dist = 30 + Math.random() * 120;
        this.angle = Math.random() * Math.PI * 2;
        this.speed = 0.005 + Math.random() * 0.01;
        this.size = 2 + Math.random() * 3; 
        this.type = cfg.planetTypes[Math.floor(Math.random() * cfg.planetTypes.length)];
        this.color = cfg.palettes[this.type][Math.floor(Math.random() * cfg.palettes[this.type].length)];
        this.blobs = [];

        const blobCount = 2 + Math.floor(Math.random() * 2); // 2–3 blobs

        for (let i = 0; i < blobCount; i++) {
            this.blobs.push({
                angle: Math.random() * Math.PI * 2,
                dist: Math.random() * 0.5,         // relative to radius
                size: 0.3 + Math.random() * 0.4,   // relative size
                alpha: 0.1 + Math.random() * 0.15  // subtle
            });
        }
    }
    update() {
        this.angle += this.speed;
    }
    render1(ctx, p) {
        const px = p.x + Math.cos(this.angle) * this.dist * p.scale;
        const py = p.y + Math.sin(this.angle) * this.dist * p.scale;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(px, py, this.size * p.scale, 0, Math.PI * 2);
        ctx.fill();    
    }
render(ctx, p) {

    const px = p.x + Math.cos(this.angle) * this.dist * p.scale;
    const py = p.y + Math.sin(this.angle) * this.dist * p.scale;
    const radius = this.size * p.scale;

    // ----------------------------
    // LIGHT DIRECTION (planet -> star)
    // ----------------------------
    const lx = p.x - px;
    const ly = p.y - py;
    const len = Math.hypot(lx, ly) || 1;
    const nx = lx / len;
    const ny = ly / len;

    // ----------------------------
    // GRADIENT (curved lighting)
    // ----------------------------
    const lightOffset = radius;

    const gx1 = px - nx * lightOffset;
    const gy1 = py - ny * lightOffset;
    const gx2 = px + nx * lightOffset;
    const gy2 = py + ny * lightOffset;

    const gradient = ctx.createLinearGradient(gx1, gy1, gx2, gy2);
    gradient.addColorStop(0, "rgba(0,0,0,0.6)");
    gradient.addColorStop(0.5, this.color);
    gradient.addColorStop(1, "white");

    // ----------------------------
    // DRAW PLANET BASE
    // ----------------------------
    ctx.save();

    ctx.beginPath();
    ctx.arc(px, py, radius, 0, Math.PI * 2);
    ctx.clip(); // keep blobs inside planet

    ctx.fillStyle = gradient;
    ctx.fillRect(px - radius, py - radius, radius * 2, radius * 2);

    // ----------------------------
    // BLOBS (surface variation)
    // ----------------------------
    for (let b of this.blobs) {

        const bx = px + Math.cos(b.angle) * radius * b.dist;
        const by = py + Math.sin(b.angle) * radius * b.dist;
        const br = radius * b.size;

        ctx.fillStyle = `rgba(0,0,0,${b.alpha})`;

        ctx.beginPath();
        ctx.arc(bx, by, br, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();
}
}

// ----------------------------
// STAR SYSTEMS
// ----------------------------
class Star {
    constructor(cfg) {
        this.cfg = cfg;
        this.color = cfg.starColors[Math.floor(Math.random() * cfg.starColors.length)];
        this.planets = [];
        this.hasPlanets = true;
        this.setPlanets(cfg);
        const zindex = Math.random() * cfg.DEPTH_SPREAD
        this.setPosition(zindex);
        this.r = 2 + Math.random() * 3;
    }
    setPosition(zindex) {
        this.x = (Math.random() - 0.5) * this.cfg.width;
        this.y = (Math.random() - 0.5) * this.cfg.height;
        this.z = zindex;    
    }
    setPlanets(cfg) {
        this.planets = [];
        this.hasPlanets = Math.random() < 0.6;        
        if ( this.hasPlanets ) {
            const n = 1 + Math.floor(Math.random() * 5);
            for ( let i = 0; i < n; i++ ) {
                this.planets.push(new Planet(cfg));
            }
        }
    }
    render(ctx, p) {
        const radius = this.r * p.scale;

        // ----------------------------
        // STAR GLOW (key addition)
        // ----------------------------
        ctx.save();

        ctx.shadowBlur = 12 * p.scale;
        ctx.shadowColor = this.color;

        ctx.fillStyle = this.color;

        ctx.beginPath();
        ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
        /*ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, this.r * p.scale, 0, Math.PI * 2);
        ctx.fill(); */ 
        if ( this.hasPlanets ) {
            for (let pl of this.planets) {
                pl.render(ctx, p);
            }
        }
    }
    update() {  // planets always orbit
        for (let p of this.planets) {
            p.update();
        }    
    }
    // ----------------------------
    // RECYCLING (behind ship → ahead)
    // ----------------------------
    recycle(zindex) {
        this.setPlanets(this.cfg);
        this.setPosition(zindex);
    }
}

const stars = [];
// initial field ahead of ship
for ( let i = 0; i < config.STAR_COUNT; i++ ) {
  stars.push(new Star(config)); 
}

// ----------------------------
// SIMPLE PERSPECTIVE PROJECTION
// ----------------------------
class Perspective {
    project(star, ship, cnvs) {
        const dz = star.z - ship.z;
        const scale = 600 / dz;

        return {
            //x: cnvs.halfWidth + star.x * scale,
            //y: cnvs.halfHeight + star.y * scale,
            x: cnvs.halfWidth + (star.x - ship.x) * scale,
            y: cnvs.halfHeight + (star.y - ship.y) * scale,
            scale,
            dz
        };
    }
}

const ship = new Ship(config);
const perspective = new Perspective();

// ----------------------------
// UPDATE
// ----------------------------
function update(timestamp) {
    // ship moves forward
    ship.update();
    config.ctx.fillStyle = "black";
    config.ctx.fillRect(0, 0, config.width, config.height);
    for ( let star of stars ) {
        star.update();
        // recycle when passed behind ship
        if ( star.z < ship.z - 200 ) {
            star.recycle(ship.z + config.DEPTH_SPREAD);
        }
        
        const p = perspective.project(star, ship, config);
        // behind or too close → skip rendering
        if (p.dz <= 0) continue;
        // star
        star.render(config.ctx, p);
    }
    ship.render(config.ctx);
    requestAnimationFrame(update);
    DeltaReport.log(timestamp);
}
update(performance.now());
</script>
</body>
</html>
