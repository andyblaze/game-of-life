<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spyrograrf</title>
<link href="css/sys.css" type="text/css" rel="stylesheet">
</head>
<body>
<form id="ui-panel">
    {outerRadiusXCtrl}
    {outerRadiusYCtrl}
    {rotationCtrl}
    {innerRadiusCtrl}
    {penOffsetCtrl} 
    {speedCtrl}
    <div class="col-3">
        <h4>Colour / Alpha (Opacity)</h4>
        {colorStartCtrl}
        {colorEndCtrl}
        {alphaCtrl}        
    </div>
    {rotationForceCtrl}
    {pinchForceCtrl}
    {bendForceCtrl}
    <div><button type="button" id="go-btn">Go</button></div>
</form>
<div id="workspace">
    <canvas id="spiro" width="800" height="800"></canvas>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
