<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{htmlTitle}</title>
{cssFile}
</head>

<body>
<div id="app">
    <div id="hud">
        <div id="info">
            <div id="farms">
                <div> Iron: <span id="iron">0</span></div>
                <div> Coal: <span id="coal">0</span></div>
                <div> Wheat: <span id="wheat">0</span></div>
                <div> Wood: <span id="wood">0</span></div>
            </div>
            <div id="buildings">
                <div> Bread: <span id="bread">0</span></div>
                <div> Power: <span id="power">0</span></div>
            </div>
            <div id="populations">
                <div> Population: <span id="humans">0</span></div>
                <div> Robots: <span id="robots">0</span></div>
            </div>
            <div id="stats">
                <div> Morale: <span id="morale">0</span></div>
                <!-- probably more here later -->
            </div>
        </div>
        <div id="msg"></div>
    </div>
    <div id="game-area">
        <button type="button" class="farm-btn" data-type="coal">Add Coal mine</button>
        <button type="button" class="farm-btn" data-type="wheat">Add Wheat farm</button>
        <button type="button" class="farm-btn" data-type="wood">Add Wood farm</button>
        <button class="farm-btn" data-type="iron">Add Iron mine</button>
    </div>
</div>
<script type="module" src="jsv2/main.js"></script>
</body>
</html>
