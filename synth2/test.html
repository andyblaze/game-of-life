<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Synth + Scope</title>

<link rel="stylesheet" type="text/css" href="css/site.css">
</head>

<body>
<div id="app">

  <!-- OSCILLOSCOPE -->
  <div id="canvas-container">
    <canvas id="scope"></canvas>
  </div>

  <!-- CONTROLS -->
  <div id="ui-controls">

    <input type="range" min="100" max="700" step="1" id="osc">

    <h3>Oscillator</h3>

    <label>
      Waveform
      <select>
        <option>sine</option>
        <option>square</option>
        <option>sawtooth</option>
        <option>triangle</option>
      </select>
    </label>

    <label>
      Detune
      <input type="range" min="0" max="10" step="0.1">
    </label>

    <h3>Filter</h3>

    <label>
      Cutoff
      <input type="range" min="100" max="5000">
    </label>

    <label>
      Resonance
      <input type="range" min="0" max="20">
    </label>

    <h3>Modulation</h3>

    <label>
      Tremolo Depth
      <input type="range" min="0" max="1" step="0.01">
    </label>

    <label>
      Tremolo Rate
      <input type="range" min="0" max="10" step="0.1">
    </label>

  </div>

</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
