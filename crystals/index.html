<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crystal Grower</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
}
canvas{
    display:block;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w,h;
let cx,cy;

let crystal=[];
let particles=[];

let maxRadius=10;

const PARTICLES=500;
const STEP=3;
const STICK_DIST=4;

function resize(){

    w=canvas.width=window.innerWidth;
    h=canvas.height=window.innerHeight;

    cx=w/2;
    cy=h/2;
}

window.addEventListener("resize",resize);
resize();


function reset(){

    crystal=[];
    particles=[];
    maxRadius=10;

    crystal.push({x:cx,y:cy});

    for(let i=0;i<PARTICLES;i++){
        spawnParticle();
    }
}


function spawnParticle(){

    let angle=Math.random()*Math.PI*2;
    let r=maxRadius+40;

    let x=cx+Math.cos(angle)*r;
    let y=cy+Math.sin(angle)*r;

    particles.push({x,y});
}


function dist(ax,ay,bx,by){

    let dx=ax-bx;
    let dy=ay-by;

    return Math.sqrt(dx*dx+dy*dy);
}



function stick(px,py){

    for(let i=0;i<6;i++){

        let angle=i*Math.PI/3;

        let dx=px-cx;
        let dy=py-cy;

        let r=Math.sqrt(dx*dx+dy*dy);
        let a=Math.atan2(dy,dx)+angle;

        let x=cx+Math.cos(a)*r;
        let y=cy+Math.sin(a)*r;

        crystal.push({x,y});

        if(r>maxRadius) maxRadius=r;
    }
}



function update(){

    for(let p of particles){

        p.x+=(Math.random()-0.5)*STEP;
        p.y+=(Math.random()-0.5)*STEP;

        let dx=p.x-cx;
        let dy=p.y-cy;

        let r=Math.sqrt(dx*dx+dy*dy);

        if(r>maxRadius+120){

            p.dead=true;
            spawnParticle();
            continue;
        }

        for(let c of crystal){

            if(dist(p.x,p.y,c.x,c.y)<STICK_DIST){

                stick(p.x,p.y);

                p.dead=true;
                spawnParticle();
                break;
            }
        }
    }

    particles=particles.filter(p=>!p.dead);

    if(crystal.length>12000){
        setTimeout(reset,2000);
    }
}



function drawFacet(x,y){

    let size=2+Math.random()*2;

    let hue=180+Math.sin(x*0.01+y*0.01)*40;

    ctx.fillStyle=`hsl(${hue},100%,70%)`;
    ctx.shadowColor=`hsl(${hue},100%,70%)`;
    ctx.shadowBlur=12;

    ctx.beginPath();

    ctx.moveTo(x,y-size);
    ctx.lineTo(x+size,y);
    ctx.lineTo(x,y+size);
    ctx.lineTo(x-size,y);

    ctx.closePath();
    ctx.fill();
}



function draw(){

    ctx.fillStyle="rgba(0,0,0,0.12)";
    ctx.fillRect(0,0,w,h);

    for(let c of crystal){

        drawFacet(c.x,c.y);

    }

    ctx.shadowBlur=0;

    ctx.fillStyle="rgba(255,255,255,0.4)";

    for(let p of particles){

        ctx.fillRect(p.x,p.y,1,1);

    }

}



function loop(){

    update();
    draw();
    requestAnimationFrame(loop);

}


reset();
loop();

</script>

</body>
</html>
